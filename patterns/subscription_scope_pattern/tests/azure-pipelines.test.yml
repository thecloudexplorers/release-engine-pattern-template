name: $(Build.DefinitionName)_$(Date:yyyyMMdd)$(Rev:.r)

resources:
  repositories:
    - repository: release-engine-core # REPOSITORY ALIAS ###  MUST NOT  ### BE CHANGED
      type: github
      name: thecloudexplorers/release-engine-core # RELEASE ENGINE REPOSITORY ###  MUST NOT  ### BE CHANGED
      endpoint: thecloudexplorers
      ref: refs/heads/users/wcamargo/subscription-scope-tests

trigger:
  branches:
    include:
      - users/*
  paths:
    include:
      - patterns/subscription_scope_pattern/**

pool: MSHosted-WorkloadsPool

extends:
  template: /patterns/subscription_scope_pattern/deployment-pattern.yml
  parameters:
    deploymentSettings:
      configurationFilePath: /patterns/subscription_scope_pattern/tests/_config
      patternContext: 'internal'

      environments:
        - name: development
          dependsOn: build
          displayName: Dev
          afterBuild: true
        - name: test
          dependsOn: development
          displayName: Test
        - name: production
          dependsOn: test
          displayName: Prod
