name: $(Build.DefinitionName)_$(Date:yyyyMMdd)$(Rev:.r)

resources:
  repositories:
    - repository: release-engine-core # REPOSITORY ALIAS ###  MUST NOT  ### BE CHANGED
      type: github
      name: thecloudexplorers/release-engine-core # RELEASE ENGINE REPOSITORY ###  MUST NOT  ### BE CHANGED
      endpoint: thecloudexplorers
      ref: refs/tags/v1.9.0

trigger:
  branches:
    include:
      - users/*
  paths:
    include:
      - patterns/examples/subscription_scope_pattern/**

pr:
  branches:
    include:
      - main

pool: MSHosted-WorkloadsPool

extends:
  template: /patterns/examples/subscription_scope_pattern/deployment-pattern.yml
  parameters:
    deploymentSettings:
      configurationFilePath: /patterns/examples/subscription_scope_pattern/tests/_config
      # Indicates if this is a test pipeline
      # Must be set to test release-engine functionalities or patterns
      isTestPipeline: true

      environments:
        - name: development
          dependsOn: build
          displayName: Dev
          afterBuild: true
        - name: test
          dependsOn: development
          displayName: Test
        - name: production
          dependsOn: test
          displayName: Prod
